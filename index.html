    <!-- Google Fonts with display=swap for better performance -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400..700&family=Instrument+Serif:ital@0;1&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <style>
      .noise-bg-generated {
        /* Vite builder sometimes chokes on complex inline SVGs with escaped quotes in HTML attrs */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
    </style>
  </head>
  <body>
    <!-- Global CSS Noise Overlay via CSS Class -->
    <div class="noise-overlay noise-bg-generated"></div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
